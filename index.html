
<form id="rebuildForm">
  <input type="text" id="projectName" placeholder="사업명" required>
  <input type="number" id="totalArea" oninput="calculateArea()" placeholder="구역 총 면적">
  <input type="number" id="excludeArea" oninput="calculateArea()" placeholder="제외 면적">
  <input type="number" id="netArea" readonly placeholder="실사용 대지면적">
  <select id="baseYear">
    <option value="2026">2026</option>
    </select>
  <input type="number" id="targetUnits" placeholder="목표 세대수">
  <input type="number" id="profitRate" placeholder="비례율 기준점 (%)">
  <button type="submit">데이터 저장</button>
</form>

<script>
  // 1. 실사용 대지면적 자동 계산
  function calculateArea() {
    const total = parseFloat(document.getElementById('totalArea').value) || 0;
    const exclude = parseFloat(document.getElementById('excludeArea').value) || 0;
    document.getElementById('netArea').value = total - exclude;
  }

  // 2. 데이터 저장 요청
  document.getElementById('rebuildForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      projectName: document.getElementById('projectName').value,
      totalArea: document.getElementById('totalArea').value,
      excludeArea: document.getElementById('excludeArea').value,
      netArea: document.getElementById('netArea').value,
      baseYear: document.getElementById('baseYear').value,
      targetUnits: document.getElementById('targetUnits').value,
      profitRate: document.getElementById('profitRate').value
    };

    const response = await fetch('/api/save-rebuild-data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    
    if (response.ok) alert('데이터가 저장되었습니다.');
  });
</script>
